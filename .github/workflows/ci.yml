name: Integracion Continua (CI)

on:
  push:
    branches: [ "main", "integrante-2" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Copia tu código a la máquina de GitHub
    - name: Checkout del código
      uses: actions/checkout@v3

    # 2. Instala la versión correcta de Python
    - name: Configurar Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # 3. Instala las librerías necesarias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r ml_service/requirements.txt
        pip install pytest httpx

    # 4. Ejecuta tus pruebas automatizadas
    - name: Correr pruebas con Pytest
      run: |
        PYTHONPATH=./ml_service pytest ml_service/test/